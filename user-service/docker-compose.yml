
services:
  user-service:
    build: .
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=secret
      - DB_NAME=identity_users
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: users-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: identity_users
    ports:
      - "3307:3306"
    volumes:
      - users_data:/var/lib/mysql

volumes:
  users_data:
